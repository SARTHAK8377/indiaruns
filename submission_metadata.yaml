# AI tools declaration (transparency only)
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude for architecture discussion, code review, and help structuring the
  scoring pipeline. No candidate data was sent to any hosted LLM during ranking;
  the ranking step is fully local, CPU-only, and offline.

methodology_summary: |
  Hybrid ranker over pre-computed embeddings. A weighted base score (semantic
  similarity, trust-weighted skill match, title relevance, experience-band fit,
  location, education) is combined with a multiplicative behavioral-availability
  modifier and explicit negative-signal penalties (consulting-only careers,
  job-hopping). Impossible profiles are caught by consistency checks
  (expert-skill-with-zero-duration, experience vs. career-span gap) and forced
  out of the top 100. The title component is the primary defense against
  keyword-stuffer honeypots. Ranking runs in well under 5 minutes on CPU.

